name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

"on":
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      python: ${{ steps.filter.outputs.python }}
      yaml: ${{ steps.filter.outputs.yaml }}
      compose: ${{ steps.filter.outputs.compose }}
      relevant: ${{ steps.filter.outputs.relevant }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            shell:
              - '**/*.sh'
            python:
              - '**/*.py'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            compose:
              - 'docker-compose.yml'
            relevant:
              - '**'
              - '!**/*.md'
              - '!LICENSE'

  autofix:
    name: Auto-fix formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && (needs.detect-changes.outputs.shell == 'true' || needs.detect-changes.outputs.python == 'true')
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: .github/workflows/ci.yml

      - name: Shell formatting (shfmt)
        if: needs.detect-changes.outputs.shell == 'true'
        uses: mfinelli/setup-shfmt@v4.0.1

      - name: Apply auto-formatters
        run: |
          set -euo pipefail

          if [ "${{ needs.detect-changes.outputs.shell }}" == "true" ]; then
            mapfile -t sh_files < <(git ls-files '*.sh')
            if [ "${#sh_files[@]}" -gt 0 ]; then
              shfmt -w -i 2 -ci "${sh_files[@]}"
            fi
          fi

          if [ "${{ needs.detect-changes.outputs.python }}" == "true" ]; then
            mapfile -t py_files < <(git ls-files '*.py')
            if [ "${#py_files[@]}" -gt 0 ]; then
              uvx ruff format "${py_files[@]}"
            fi
          fi

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore(ci): auto-format via GitHub Actions"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

  shell-checks:
    name: Shell checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, autofix]
    if: always() && needs.detect-changes.outputs.shell == 'true' && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Shell formatting (shfmt)
        uses: mfinelli/setup-shfmt@v4.0.1

      - name: Shell script syntax (all tracked .sh)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -gt 0 ]; then
            bash -n "${files[@]}"
          fi

      - name: Check shell formatting (all tracked .sh)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -gt 0 ]; then
            shfmt -d -i 2 -ci "${files[@]}"
          fi

  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, autofix]
    if: always() && needs.detect-changes.outputs.python == 'true' && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: .github/workflows/ci.yml

      - name: Python formatting and lint (all tracked .py)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.py')
          if [ "${#files[@]}" -gt 0 ]; then
            uvx ruff format --check "${files[@]}"
            uvx ruff check "${files[@]}"
          fi

      - name: Python type checking (all tracked .py)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.py')
          if [ "${#files[@]}" -gt 0 ]; then
            uvx ty check "${files[@]}"
          fi

      - name: Python compile check
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.py')
          if [ "${#files[@]}" -gt 0 ]; then
            python -m py_compile "${files[@]}"
          fi

  yaml-actions-checks:
    name: YAML and actions checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, autofix]
    if: always() && needs.detect-changes.outputs.yaml == 'true' && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: .github/workflows/ci.yml

      - name: YAML validation (all tracked .yml/.yaml)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.yml' '*.yaml')
          if [ "${#files[@]}" -gt 0 ]; then
            uvx yamllint -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable}}' "${files[@]}"
          fi

      - name: GitHub Actions workflow lint
        uses: docker://rhysd/actionlint:1.7.12

  compose-security-checks:
    name: Compose and security checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, autofix]
    if: always() && needs.detect-changes.outputs.relevant == 'true' && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Docker Compose render
        run: docker compose -f docker-compose.yml config > /tmp/compose.rendered.yaml

      - name: Secret scan
        run: ./scripts/secret-scan.sh

  lint-and-validate:
    name: Lint, Type, Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
      - shell-checks
      - python-checks
      - yaml-actions-checks
      - compose-security-checks
    if: always()

    steps:
      - name: Verify required jobs passed
        run: |
          set -euo pipefail

          if [ "${{ needs.detect-changes.outputs.shell }}" == "true" ]; then
            [[ "${{ needs.shell-checks.result }}" == "success" ]]
          fi

          if [ "${{ needs.detect-changes.outputs.python }}" == "true" ]; then
            [[ "${{ needs.python-checks.result }}" == "success" ]]
          fi

          if [ "${{ needs.detect-changes.outputs.yaml }}" == "true" ]; then
            [[ "${{ needs.yaml-actions-checks.result }}" == "success" ]]
          fi

          if [ "${{ needs.detect-changes.outputs.relevant }}" == "true" ]; then
            [[ "${{ needs.compose-security-checks.result }}" == "success" ]]
          fi
