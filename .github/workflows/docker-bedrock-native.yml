name: Docker Bedrock Native

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Source defaults to upstream headroom main; workflow_dispatch can override.
  HEADROOM_SOURCE_REPO: chopratejas/headroom
  HEADROOM_SOURCE_REF: main

"on":
  workflow_dispatch:
    inputs:
      headroom_source_repo:
        description: "Headroom source repo (owner/name)"
        required: false
        default: "chopratejas/headroom"
      headroom_source_ref:
        description: "Headroom source ref (commit/tag/branch)"
        required: false
        default: "main"
  push:
    branches: [main]
    paths:
      - "Dockerfile.bedrock-native"
      - ".github/workflows/docker-bedrock-native.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-bedrock-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            cache-scope: bedrock-native-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            cache-scope: bedrock-native-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Normalize image name
        id: image-name
        run: |
          image_name="$(printf '%s' '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          printf 'image_name=%s\n' "$image_name" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: short-sha
        run: printf 'sha=%s\n' "${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Resolve source repo/ref
        id: source
        run: |
          repo="${{ github.event.inputs.headroom_source_repo || env.HEADROOM_SOURCE_REPO }}"
          ref="${{ github.event.inputs.headroom_source_ref || env.HEADROOM_SOURCE_REF }}"
          printf 'repo=%s\n' "$repo" >> "$GITHUB_OUTPUT"
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"
          echo "Building from $repo @ $ref"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bedrock-native
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          build-args: |
            HEADROOM_GIT_REPO=${{ steps.source.outputs.repo }}
            HEADROOM_GIT_REF=${{ steps.source.outputs.ref }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.cache-scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build

    steps:
      - name: Normalize image name
        id: image-name
        run: |
          image_name="$(printf '%s' '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          printf 'image_name=%s\n' "$image_name" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: short-sha
        run: printf 'sha=%s\n' "${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=bedrock-native-${{ steps.short-sha.outputs.sha }}
            type=raw,value=bedrock-native
            type=raw,value=bedrock-native-latest
            type=ref,event=branch,prefix=bedrock-native-

      - name: Create and push multi-platform manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}@sha256:%s ' *)
