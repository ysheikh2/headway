name: Sync Upstream Patch Compatibility

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

"on":
  schedule:
    - cron: "41 4 * * *"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Headroom git ref (branch/tag/SHA)"
        required: false
        default: "main"

concurrency:
  group: sync-upstream-patch-compat-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream-patch:
    name: Check upstream patch compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/headroom-upstream-target
          key: upstream-compat-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}
          restore-keys: |
            upstream-compat-${{ runner.os }}-${{ github.workflow }}-
            upstream-compat-${{ runner.os }}-

      - name: Resolve upstream ref
        id: upstream
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.upstream_ref || 'main' }}"
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Check patch compatibility and refresh record
        env:
          CARGO_TARGET_DIR: /tmp/headroom-upstream-target
        run: |
          set -euo pipefail
          python scripts/build/headroom_upstream/check_upstream_patch_compat.py \
            --repo chopratejas/headroom \
            --ref "${{ steps.upstream.outputs.ref }}" \
            --cargo-check \
            --record-path scripts/build/headroom_upstream/upstream_patch_compat.json

      - name: Compile check helper scripts
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/build/headroom_upstream/check_upstream_patch_compat.py \
            scripts/build/headroom_upstream/patch_headroom_upstream.py

      - name: Detect compatibility record changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/build/headroom_upstream/upstream_patch_compat.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: cpr
        if: steps.changes.outputs.has_changes == 'true'
        # Requires "Allow GitHub Actions to create and approve pull requests" in
        # Settings → Actions → General. Without it the step is skipped gracefully.
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(upstream): refresh patch compatibility record"
          title: "chore(upstream): refresh patch compatibility record"
          body: |
            Automated refresh for `scripts/build/headroom_upstream/patch_headroom_upstream.py` compatibility against upstream Headroom.

            - Upstream ref: `${{ steps.upstream.outputs.ref }}`
            - Command:
              `python scripts/build/headroom_upstream/check_upstream_patch_compat.py --cargo-check --record-path scripts/build/headroom_upstream/upstream_patch_compat.json`

            Safe to merge when CI passes.
          branch: chore/sync-upstream-patch-compat
          delete-branch: true
          labels: |
            chore
            dependencies

      - name: Enable auto-merge on created PR
        if: steps.cpr.outputs.pull-request-url != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.cpr.outputs.pull-request-url }}" --auto --squash

      - name: Notice if PR creation was skipped
        if: steps.changes.outputs.has_changes == 'true' && steps.cpr.outcome != 'success'
        run: |
          echo "::warning::Compat record changed but auto-PR failed. Enable 'Allow GitHub Actions to create and approve pull requests' in Settings → Actions → General, or open a PR from branch chore/sync-upstream-patch-compat manually."
