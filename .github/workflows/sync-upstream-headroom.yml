name: Sync Upstream Dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

"on":
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Headroom git ref (branch/tag/SHA)"
        required: false
        default: "main"

concurrency:
  group: sync-upstream-headroom
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync upstream dashboard template
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Resolve upstream ref
        id: upstream
        env:
          INPUT_UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail
          ref="$INPUT_UPSTREAM_REF"
          [[ "$ref" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "Invalid upstream_ref"; exit 1; }
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Sync dashboard from upstream and apply patch
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          set -euo pipefail
          python scripts/runtime/headroom/sync_dashboard.py \
            --url "https://raw.githubusercontent.com/chopratejas/headroom/${UPSTREAM_REF}/headroom/dashboard/templates/dashboard.html"

      - name: Validate dashboard patch invariants
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          set -euo pipefail
          python scripts/runtime/headroom/sync_dashboard.py \
            --url "https://raw.githubusercontent.com/chopratejas/headroom/${UPSTREAM_REF}/headroom/dashboard/templates/dashboard.html" \
            --check

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/runtime/headroom/dashboard.html; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR body
        if: steps.changes.outputs.has_changes == 'true'
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          set -euo pipefail
          bt='`'
          {
            printf 'Automated dashboard sync from upstream Headroom (%s%s%s).\n\n' "$bt" "$UPSTREAM_REF" "$bt"
            printf '%s\n\n' '- **Dashboard template**: upstream dashboard changed; local patches re-applied and validated.'
            printf '%s\n' 'This PR is safe to merge when CI passes.'
          } > /tmp/pr-body.txt

      - name: Create pull request
        id: cpr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(upstream): sync headroom dashboard template"
          title: "chore(upstream): sync headroom dashboard template"
          body-path: /tmp/pr-body.txt
          branch: chore/sync-upstream-dashboard
          delete-branch: true
          labels: |
            chore
            dependencies

      - name: Enable auto-merge on created PR
        if: steps.cpr.outputs.pull-request-url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.cpr.outputs.pull-request-url }}" --auto --squash
