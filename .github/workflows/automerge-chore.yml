name: Automerge Chore PRs

"on":
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-automerge:
    name: Enable automerge for eligible chore PRs
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' ||
      github.event_name == 'check_suite'
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "check_suite" ]; then
            prs='${{ toJson(github.event.check_suite.pull_requests) }}'
            python - <<'PY' >> "$GITHUB_OUTPUT"
import json, os
prs = json.loads(os.environ["PRS_JSON"]) if os.environ.get("PRS_JSON") else []
if prs:
    print(f"number={prs[0]['number']}")
PY
          fi
        env:
          PRS_JSON: ${{ toJson(github.event.check_suite.pull_requests) }}

      - name: Exit when no PR found
        if: steps.pr.outputs.number == ''
        run: exit 0

      - name: Check PR eligibility
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          pr_json=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          base_ref=$(python - <<'PY'
import json,sys
print(json.load(sys.stdin)['base']['ref'])
PY
<<< "$pr_json")
          draft=$(python - <<'PY'
import json,sys
print(str(json.load(sys.stdin)['draft']).lower())
PY
<<< "$pr_json")
          author=$(python - <<'PY'
import json,sys
print(json.load(sys.stdin)['user']['login'])
PY
<<< "$pr_json")
          labels=$(python - <<'PY'
import json,sys
print(','.join([x['name'] for x in json.load(sys.stdin).get('labels',[])]))
PY
<<< "$pr_json")

          ok=true
          if [ "$base_ref" != "main" ]; then ok=false; fi
          if [ "$draft" != "false" ]; then ok=false; fi
          if [[ ",$labels," != *,chore,* && ",$labels," != *,dependencies,* ]]; then ok=false; fi
          if [[ ",$labels," == *,do-not-merge,* || ",$labels," == *,security,* ]]; then ok=false; fi
          if [ "$author" != "dependabot[bot]" ] && [ "$author" != "renovate[bot]" ]; then ok=false; fi

          echo "ok=$ok" >> "$GITHUB_OUTPUT"

      - name: Enable automerge (squash)
        if: steps.gate.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
