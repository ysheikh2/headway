name: Automerge Chore PRs

"on":
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, ready_for_review]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-automerge:
    name: Enable automerge
    runs-on: ubuntu-latest
    if: >
      (github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]') &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'chore') || contains(github.event.pull_request.labels.*.name, 'dependencies')) &&
      !contains(github.event.pull_request.labels.*.name, 'do-not-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'security')
    steps:
      - name: Enable automerge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.html_url }}" --auto --squash
