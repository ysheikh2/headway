name: Docker Headroom Bundled

# Stopgap workflow. Builds the published headroom `:code` image with the native
# `headroom-proxy` binary layered on top (see Dockerfile.headroom-bundled) and
# publishes it as `:headroom-bundled`. Headway's compose runs BOTH the Python
# proxy and the native bedrock proxy from this single image.
#
# This exists only because the upstream headroom publish that would have shipped
# the binary inside `:code` failed transiently. Once upstream `:code` carries
# the binary, delete this workflow + Dockerfile.headroom-bundled and point
# HEADROOM_IMAGE straight at ghcr.io/chopratejas/headroom:code.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HEADROOM_SOURCE_REPO: chopratejas/headroom
  HEADROOM_SOURCE_REF: main
  HEADROOM_CODE_IMAGE: ghcr.io/chopratejas/headroom:code

"on":
  workflow_dispatch:
    inputs:
      headroom_source_repo:
        description: "Headroom source repo (owner/name) for the proxy binary"
        required: false
        default: "chopratejas/headroom"
      headroom_source_ref:
        description: "Headroom source ref (commit/tag/branch) for the proxy binary"
        required: false
        default: "main"
      headroom_code_image:
        description: "Base headroom :code image to layer the binary onto"
        required: false
        default: "ghcr.io/chopratejas/headroom:code"
  push:
    branches: [main]
    paths:
      - "Dockerfile.headroom-bundled"
      - ".github/workflows/docker-headroom-bundled.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-headroom-bundled-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            cache-scope: headroom-bundled-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            cache-scope: headroom-bundled-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Normalize image name
        id: image-name
        run: |
          image_name="$(printf '%s' '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          printf 'image_name=%s\n' "$image_name" >> "$GITHUB_OUTPUT"

      - name: Resolve source repo/ref/base
        id: source
        run: |
          repo="${{ github.event.inputs.headroom_source_repo || env.HEADROOM_SOURCE_REPO }}"
          ref="${{ github.event.inputs.headroom_source_ref || env.HEADROOM_SOURCE_REF }}"
          base="${{ github.event.inputs.headroom_code_image || env.HEADROOM_CODE_IMAGE }}"
          printf 'repo=%s\n' "$repo" >> "$GITHUB_OUTPUT"
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"
          printf 'base=%s\n' "$base" >> "$GITHUB_OUTPUT"
          echo "Building binary from $repo @ $ref, layered onto $base"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image digest
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.headroom-bundled
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          build-args: |
            HEADROOM_GIT_REPO=${{ steps.source.outputs.repo }}
            HEADROOM_GIT_REF=${{ steps.source.outputs.ref }}
            HEADROOM_CODE_IMAGE=${{ steps.source.outputs.base }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digest-${{ matrix.cache-scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build

    steps:
      - name: Normalize image name
        id: image-name
        run: |
          image_name="$(printf '%s' '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          printf 'image_name=%s\n' "$image_name" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: short-sha
        run: printf 'sha=%s\n' "${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=headroom-bundled-${{ steps.short-sha.outputs.sha }}
            type=raw,value=headroom-bundled
            type=ref,event=branch,prefix=headroom-bundled-

      - name: Create and push multi-platform manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          tag_args="$(printf '%s' "$TAGS_JSON" | jq -cr '.tags | map("-t " + .) | join(" ")')"
          digest_args="$(printf "${IMAGE}@sha256:%s " *)"
          # shellcheck disable=SC2086
          docker buildx imagetools create $tag_args $digest_args
