name: Sync Dashboard From Headroom

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

"on":
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Headroom git ref (branch/tag/SHA)"
        required: false
        default: "main"

concurrency:
  group: sync-dashboard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-dashboard:
    name: Sync dashboard and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Resolve upstream raw URL
        id: upstream
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.upstream_ref || 'main' }}"
          url="https://raw.githubusercontent.com/chopratejas/headroom/${ref}/headroom/dashboard/templates/dashboard.html"
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"
          printf 'url=%s\n' "$url" >> "$GITHUB_OUTPUT"
          echo "Using upstream: $url"

      - name: Sync dashboard from upstream + local patch
        run: |
          set -euo pipefail
          python scripts/runtime/headroom/sync_dashboard.py --url "${{ steps.upstream.outputs.url }}"

      - name: Validate generated dashboard patch invariants
        run: |
          set -euo pipefail
          python scripts/runtime/headroom/sync_dashboard.py --url "${{ steps.upstream.outputs.url }}" --check

      - name: Python compile check for sync script
        run: |
          set -euo pipefail
          python -m py_compile scripts/runtime/headroom/sync_dashboard.py

      - name: Detect dashboard changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/runtime/headroom/dashboard.html; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: cpr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(dashboard): sync upstream dashboard template"
          title: "chore(dashboard): sync upstream dashboard template"
          body: |
            Automated dashboard refresh from upstream Headroom.

            - Source ref: `${{ steps.upstream.outputs.ref }}`
            - Source URL: `${{ steps.upstream.outputs.url }}`
            - Regeneration: `python scripts/runtime/headroom/sync_dashboard.py`

            This PR is safe to merge when CI passes.
          branch: chore/sync-dashboard
          delete-branch: true
          labels: |
            chore
            dependencies

      - name: Enable auto-merge on created PR
        if: steps.cpr.outputs.pull-request-url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.cpr.outputs.pull-request-url }}" --auto --squash
