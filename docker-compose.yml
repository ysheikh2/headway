# LiteLLM + Headroom gateway — Docker Compose
#
# Architecture:
#   Kilo (Copilot)  -> Headroom :4000 -> LiteLLM :4001 -> GitHub Copilot
#   Kilo (Bedrock)  -> Headroom :4002 (native Bedrock routes) -> AWS Bedrock
#
# Copilot lane uses ghcr.io/chopratejas/headroom:code (Python proxy).
# Bedrock lane uses HEADROOM_BEDROCK_IMAGE — a Rust binary built from
# chopratejas/headroom via docker-bedrock-native workflow and pushed to GHCR.
# Runtime state is persisted in-repo under .data/ (gitignored).
# Headroom state is intentionally shared across :4000 and :4002 lanes.

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4000"
    environment:
      - AWS_PROFILE=${AWS_PROFILE:?AWS_PROFILE must be set — run 'headway init'}
      - AWS_CONFIG_FILE=/root/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      - GITHUB_COPILOT_TOKEN_DIR=/root/.config/litellm/github_copilot
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - ./.data/litellm:/root/.config/litellm
      - ${HOME}/.aws:/root/.aws
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  headroom:
    image: ghcr.io/chopratejas/headroom:code
    container_name: headroom-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:8787"
      - "127.0.0.1:4002:8787"
    environment:
      - HEADROOM_TELEMETRY=off
      - HEADROOM_BEDROCK_STATS_URL=http://headroom-bedrock:8787/stats
      - HEADROOM_BEDROCK_METRICS_URL=http://headroom-bedrock:8787/metrics
      - HEADROOM_COMPRESS_USER_MESSAGES
      - HEADROOM_MIN_TOKENS
      - HEADROOM_PROTECT_RECENT
      - HEADWAY_BEDROCK_AUTO_CACHE_CONTROL=${HEADWAY_BEDROCK_AUTO_CACHE_CONTROL:-1}
      - HEADROOM_BEDROCK_PROXY_URL=http://headroom-bedrock:8787
      - HEADWAY_BEDROCK_DEBUG_COMPRESS=${HEADWAY_BEDROCK_DEBUG_COMPRESS:-0}
    entrypoint: ["python", "-m", "headroom.cli", "proxy"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8787"
      - "--openai-api-url"
      - "http://litellm:4000/v1"
      - "--no-rate-limit"
      - "--memory"
      - "--code-aware"
    depends_on:
      litellm:
        # Use service_started (not service_healthy) so headroom can start
        # immediately alongside litellm. During Copilot device auth, litellm
        # is unhealthy for up to ~3 minutes; service_healthy would cause
        # docker compose to error before the user can complete auth.
        # Headroom retries connections to litellm internally.
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./.data/headroom:/home/nonroot/.headroom
      - ./scripts/runtime/headroom/headroom_patch:/usr/local/lib/python3.13/site-packages/headroom_patch:ro
      - ./scripts/runtime/headroom/usercustomize.py:/usr/local/lib/python3.13/site-packages/usercustomize.py:ro
      - ./scripts/runtime/headroom/dashboard.html:/usr/local/lib/python3.13/site-packages/headroom/dashboard/templates/dashboard.html:ro

  headroom-bedrock:
    image: ${HEADROOM_BEDROCK_IMAGE:-ghcr.io/ysheikh2/headway:bedrock-native}
    container_name: headroom-bedrock-gateway
    restart: unless-stopped
    expose:
      - "8787"
    environment:
      - AWS_PROFILE=${BEDROCK_AWS_PROFILE:?BEDROCK_AWS_PROFILE must be set — run 'headway init'}
      - AWS_REGION=${AWS_REGION:?AWS_REGION must be set — run 'headway init'}
      - AWS_DEFAULT_REGION=${AWS_REGION:?AWS_REGION must be set — run 'headway init'}
      - HEADROOM_PROXY_AWS_PROFILE=${BEDROCK_AWS_PROFILE:?BEDROCK_AWS_PROFILE must be set — run 'headway init'}
      - HEADROOM_PROXY_BEDROCK_REGION=${AWS_REGION:?AWS_REGION must be set — run 'headway init'}
    command:
      - "--listen"
      - "0.0.0.0:8787"
      - "--upstream"
      - "https://bedrock-runtime.${AWS_REGION:?AWS_REGION must be set — run 'headway init'}.amazonaws.com"
      - "--aws-profile"
      - "${BEDROCK_AWS_PROFILE:?BEDROCK_AWS_PROFILE must be set — run 'headway init'}"
      - "--bedrock-region"
      - "${AWS_REGION:?AWS_REGION must be set — run 'headway init'}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./.data/headroom:/root/.headroom
      - ${HOME}/.aws:/root/.aws
