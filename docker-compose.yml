# Headroom gateway — Docker Compose (single Rust proxy front door)
#
# Architecture (one process fronts every lane):
#   Kilo (Copilot / OpenAI) -> headroom :4000 -> LiteLLM -> GitHub Copilot
#   Claude Code (Bedrock)   -> headroom :4002 -> native SigV4 -> AWS Bedrock
#
# The native Rust `headroom-proxy` binary (shipped in HEADROOM_IMAGE) is the
# ONLY gateway: it compresses every lane, signs Bedrock with SigV4 natively, and
# serves a single unified `/stats` JSON + `/dashboard` across all backends —
# because everything flows through one process. No Python proxy, no runtime
# patches, no cross-process stats federation. The two host ports (:4000, :4002)
# both map to the one proxy; it routes by path (`/v1/*` -> upstream LiteLLM;
# `/model/{id}/invoke[-with-response-stream]` -> native Bedrock).
#
# Runtime state (savings history) is persisted in-repo under .data/ (gitignored).
#
# LiteLLM is optional (profile: litellm) — it only provides the Copilot/OpenAI
# upstream + its auth. Bedrock needs no LiteLLM. Start Bedrock-only with
# `docker compose up`; add the Copilot lane with `docker compose --profile litellm up`.

services:
  litellm:
    profiles: [litellm]
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4000"
    environment:
      - AWS_PROFILE=${AWS_PROFILE:?AWS_PROFILE must be set — run 'headway init'}
      - AWS_CONFIG_FILE=/root/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      - GITHUB_COPILOT_TOKEN_DIR=/root/.config/litellm/github_copilot
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - ./.data/litellm:/root/.config/litellm
      - ${HOME}/.aws:/root/.aws
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  headroom:
    image: ${HEADROOM_IMAGE:-ghcr.io/chopratejas/headroom:code}
    container_name: headroom-gateway
    restart: unless-stopped
    # The single front door: the native Rust proxy, not the Python entrypoint.
    entrypoint: ["headroom-proxy"]
    ports:
      - "127.0.0.1:4000:8787"
      - "127.0.0.1:4002:8787"
    environment:
      # AWS creds for native Bedrock SigV4 signing. Explicit file paths so the
      # SDK resolves them regardless of the container's $HOME.
      - AWS_PROFILE=${BEDROCK_AWS_PROFILE:?BEDROCK_AWS_PROFILE must be set — run 'headway init'}
      - AWS_REGION=${AWS_REGION:?AWS_REGION must be set — run 'headway init'}
      - AWS_DEFAULT_REGION=${AWS_REGION:?AWS_REGION must be set — run 'headway init'}
      - AWS_CONFIG_FILE=/home/nonroot/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/home/nonroot/.aws/credentials
      # Point $HOME at the mounted .aws so the SDK's SSO token cache
      # (~/.aws/sso/cache) resolves to the bind mount regardless of the image's
      # default user.
      - HOME=/home/nonroot
      - HEADROOM_PROXY_AWS_PROFILE=${BEDROCK_AWS_PROFILE:?BEDROCK_AWS_PROFILE must be set — run 'headway init'}
      - HEADROOM_PROXY_BEDROCK_REGION=${AWS_REGION:?AWS_REGION must be set — run 'headway init'}
      - HEADROOM_TELEMETRY=off
      # Compression tuning (live-zone). Mirror prior headway agent-friendly knobs.
      - HEADROOM_PROXY_COMPRESSION=1
      - HEADROOM_PROXY_SAVINGS_PROFILE=${HEADROOM_PROXY_SAVINGS_PROFILE:-agent-90}
      # Durable savings store backing the unified /stats + /dashboard.
      - HEADROOM_PROXY_SAVINGS_PATH=/home/nonroot/.headroom/proxy_savings.json
      # Per-model USD pricing for /stats (models.dev cache synced by `headway up`).
      - HEADROOM_PRICEBOOK=/home/nonroot/.headroom/models-dev.json
    command:
      - "--listen"
      - "0.0.0.0:8787"
      # Catch-all upstream for the Copilot / OpenAI lane (compressed, then forwarded).
      - "--upstream"
      - "http://litellm:4000"
      # Native Bedrock InvokeModel/Converse routes (SigV4 re-signing to AWS).
      - "--enable-bedrock-native"
      - "true"
      - "--bedrock-region"
      - "${AWS_REGION:?AWS_REGION must be set — run 'headway init'}"
      - "--aws-profile"
      - "${BEDROCK_AWS_PROFILE:?BEDROCK_AWS_PROFILE must be set — run 'headway init'}"
      # Compress LLM-shaped requests on the catch-all (Anthropic/OpenAI) lane.
      - "--compression"
      # Persist the unified savings aggregate across restarts.
      - "--savings-path"
      - "/home/nonroot/.headroom/proxy_savings.json"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./.data/headroom:/home/nonroot/.headroom
      - ${HOME}/.aws:/home/nonroot/.aws
    depends_on:
      litellm:
        # service_started (not _healthy): LiteLLM may sit unhealthy during
        # Copilot device auth; the Bedrock lane must not be blocked on it.
        condition: service_started
        # LiteLLM is optional (profile). `required: false` lets the proxy run
        # Bedrock-only when LiteLLM isn't started, and wait for it when it is.
        required: false
