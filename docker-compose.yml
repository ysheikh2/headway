# LiteLLM + Headroom gateway — Docker Compose
#
# Architecture:
#   Kilo (Copilot)  -> Headroom :4000 -> LiteLLM :4001 -> GitHub Copilot
#   Kilo (Bedrock)  -> Headroom :4002 (native Bedrock routes) -> AWS Bedrock
#
# Copilot lane uses ghcr.io/chopratejas/headroom:code.
# Bedrock lane uses HEADROOM_BEDROCK_IMAGE (default GHCR tag shown below).
# Runtime state is persisted in-repo under .data/ (gitignored).

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4000"
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-d2i_stg}
      - AWS_CONFIG_FILE=/root/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      - GITHUB_COPILOT_TOKEN_DIR=/root/.config/litellm/github_copilot
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - ./.data/litellm:/root/.config/litellm
      - ${HOME}/.aws:/root/.aws
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  headroom:
    image: ghcr.io/chopratejas/headroom:code
    container_name: headroom-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:8787"
    environment:
      - HEADROOM_TELEMETRY=off
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8787"
      - "--openai-api-url"
      - "http://litellm:4000/v1"
      - "--no-rate-limit"
      - "--memory"
      - "--code-aware"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./.data/headroom:/root/.headroom

  headroom-bedrock:
    image: ${HEADROOM_BEDROCK_IMAGE:-ghcr.io/ysheikh2/headroom-proxy:bedrock-native}
    container_name: headroom-bedrock-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:8787"
    environment:
      - AWS_PROFILE=${BEDROCK_AWS_PROFILE:-d2i_prod}
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - AWS_DEFAULT_REGION=${AWS_REGION:-eu-central-1}
      - HEADROOM_PROXY_AWS_PROFILE=${BEDROCK_AWS_PROFILE:-d2i_prod}
      - HEADROOM_PROXY_BEDROCK_REGION=${AWS_REGION:-eu-central-1}
    command:
      - "--listen"
      - "0.0.0.0:8787"
      - "--upstream"
      - "https://bedrock-runtime.${AWS_REGION:-eu-central-1}.amazonaws.com"
      - "--aws-profile"
      - "${BEDROCK_AWS_PROFILE:-d2i_prod}"
      - "--bedrock-region"
      - "${AWS_REGION:-eu-central-1}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./.data/headroom-bedrock:/root/.headroom
      - ${HOME}/.aws:/root/.aws
